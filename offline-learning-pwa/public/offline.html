<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ecfeff, #fef3c7);
        color: #102a43;
      }

      .card {
        max-width: 420px;
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You are offline</h1>
      <p>Saved lessons are still available in the app. Reconnect to sync new content.</p>
    </section>
  </body>
</html>
